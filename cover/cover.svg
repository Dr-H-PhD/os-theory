<?xml version="1.0" encoding="UTF-8"?>
<svg width="595" height="842" viewBox="0 0 595 842" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c0c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d2d2d;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="amberGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="tealGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14b8a6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="redGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f87171;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="595" height="842" fill="url(#bgGradient)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#f59e0b" stroke-width="0.5">
    <line x1="0" y1="100" x2="595" y2="100"/>
    <line x1="0" y1="200" x2="595" y2="200"/>
    <line x1="0" y1="300" x2="595" y2="300"/>
    <line x1="0" y1="400" x2="595" y2="400"/>
    <line x1="100" y1="0" x2="100" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="500"/>
    <line x1="300" y1="0" x2="300" y2="500"/>
    <line x1="400" y1="0" x2="400" y2="500"/>
    <line x1="500" y1="0" x2="500" y2="500"/>
  </g>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="595" height="8" fill="url(#amberGradient)"/>

  <!-- OS Kernel Ring Diagram -->
  <g transform="translate(297, 250)">
    <!-- Ring 3: Applications (outermost) -->
    <circle cx="0" cy="0" r="155" fill="none" stroke="#8b5cf6" stroke-width="2" opacity="0.4"/>
    <circle cx="0" cy="0" r="155" fill="#8b5cf6" opacity="0.06"/>
    <text x="0" y="-135" font-family="Consolas, monospace" font-size="9" fill="#a78bfa" text-anchor="middle">Ring 3: User Applications</text>

    <!-- Ring 2: System Services -->
    <circle cx="0" cy="0" r="120" fill="none" stroke="#14b8a6" stroke-width="2" opacity="0.5"/>
    <circle cx="0" cy="0" r="120" fill="#14b8a6" opacity="0.08"/>
    <text x="0" y="-102" font-family="Consolas, monospace" font-size="9" fill="#2dd4bf" text-anchor="middle">Ring 2: System Services</text>

    <!-- Ring 1: Drivers -->
    <circle cx="0" cy="0" r="85" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="85" fill="#f59e0b" opacity="0.1"/>
    <text x="0" y="-68" font-family="Consolas, monospace" font-size="9" fill="#fbbf24" text-anchor="middle">Ring 1: Drivers</text>

    <!-- Ring 0: Kernel (innermost) -->
    <circle cx="0" cy="0" r="50" fill="none" stroke="#ef4444" stroke-width="2.5" opacity="0.8" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="50" fill="#ef4444" opacity="0.15"/>
    <text x="0" y="-8" font-family="Consolas, monospace" font-size="11" fill="#f87171" text-anchor="middle" font-weight="bold">Ring 0</text>
    <text x="0" y="10" font-family="Consolas, monospace" font-size="10" fill="#fca5a5" text-anchor="middle">KERNEL</text>

    <!-- Process indicators around the ring -->
    <g opacity="0.7">
      <!-- Processes orbiting ring 3 -->
      <rect x="100" y="-90" width="45" height="20" rx="3" fill="#8b5cf6" opacity="0.5"/>
      <text x="122" y="-76" font-family="Consolas, monospace" font-size="7" fill="#fff" text-anchor="middle">PID 1</text>

      <rect x="-145" y="30" width="45" height="20" rx="3" fill="#8b5cf6" opacity="0.5"/>
      <text x="-122" y="44" font-family="Consolas, monospace" font-size="7" fill="#fff" text-anchor="middle">PID 42</text>

      <rect x="60" y="110" width="50" height="20" rx="3" fill="#8b5cf6" opacity="0.5"/>
      <text x="85" y="124" font-family="Consolas, monospace" font-size="7" fill="#fff" text-anchor="middle">PID 137</text>

      <rect x="-100" y="-130" width="45" height="20" rx="3" fill="#8b5cf6" opacity="0.5"/>
      <text x="-78" y="-116" font-family="Consolas, monospace" font-size="7" fill="#fff" text-anchor="middle">PID 8</text>

      <!-- Syscall arrows -->
      <line x1="100" y1="-78" x2="55" y2="-35" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
      <line x1="-100" y1="42" x2="-55" y2="20" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,3" opacity="0.6"/>
    </g>

    <!-- Memory pages floating -->
    <g opacity="0.3">
      <rect x="-170" y="-50" width="18" height="14" rx="1" fill="#14b8a6" stroke="#14b8a6" stroke-width="0.5"/>
      <rect x="-170" y="-33" width="18" height="14" rx="1" fill="#14b8a6" stroke="#14b8a6" stroke-width="0.5" opacity="0.6"/>
      <rect x="-170" y="-16" width="18" height="14" rx="1" fill="#14b8a6" stroke="#14b8a6" stroke-width="0.5" opacity="0.3"/>

      <rect x="152" y="40" width="18" height="14" rx="1" fill="#f59e0b" stroke="#f59e0b" stroke-width="0.5"/>
      <rect x="152" y="57" width="18" height="14" rx="1" fill="#f59e0b" stroke="#f59e0b" stroke-width="0.5" opacity="0.6"/>
      <rect x="152" y="74" width="18" height="14" rx="1" fill="#f59e0b" stroke="#f59e0b" stroke-width="0.5" opacity="0.3"/>
    </g>
  </g>

  <!-- Binary decoration -->
  <g opacity="0.12" font-family="Consolas, monospace" font-size="10" fill="#f59e0b">
    <text x="30" y="460">fork()</text>
    <text x="30" y="475">exec()</text>
    <text x="30" y="490">mmap()</text>
    <text x="490" y="460">sched()</text>
    <text x="490" y="475">write()</text>
    <text x="490" y="490">ioctl()</text>
  </g>

  <!-- Main Title -->
  <text x="297" y="500" font-family="Georgia, serif" font-size="42" fill="#ffffff" text-anchor="middle" font-weight="bold" filter="url(#glow)">
    Operating Systems
  </text>
  <text x="297" y="555" font-family="Georgia, serif" font-size="42" fill="#ffffff" text-anchor="middle" font-weight="bold" filter="url(#glow)">
    Theory
  </text>

  <!-- Subtitle -->
  <text x="297" y="600" font-family="Georgia, serif" font-size="16" fill="#f59e0b" text-anchor="middle" font-style="italic">
    Processes, Memory, Concurrency, and the Abstractions
  </text>
  <text x="297" y="622" font-family="Georgia, serif" font-size="16" fill="#f59e0b" text-anchor="middle" font-style="italic">
    That Run the World
  </text>

  <!-- Accent line -->
  <rect x="150" y="640" width="295" height="2" fill="url(#amberGradient)" rx="1"/>

  <!-- Topic badges -->
  <g transform="translate(297, 670)">
    <rect x="-250" y="0" width="75" height="26" rx="13" fill="none" stroke="#ef4444" stroke-width="1.5"/>
    <text x="-212" y="17" font-family="Arial, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">Processes</text>

    <rect x="-160" y="0" width="70" height="26" rx="13" fill="none" stroke="#14b8a6" stroke-width="1.5"/>
    <text x="-125" y="17" font-family="Arial, sans-serif" font-size="10" fill="#14b8a6" text-anchor="middle">Memory</text>

    <rect x="-75" y="0" width="80" height="26" rx="13" fill="none" stroke="#8b5cf6" stroke-width="1.5"/>
    <text x="-35" y="17" font-family="Arial, sans-serif" font-size="10" fill="#8b5cf6" text-anchor="middle">Concurrency</text>

    <rect x="20" y="0" width="60" height="26" rx="13" fill="none" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="50" y="17" font-family="Arial, sans-serif" font-size="10" fill="#f59e0b" text-anchor="middle">Files</text>

    <rect x="95" y="0" width="70" height="26" rx="13" fill="none" stroke="#ec4899" stroke-width="1.5"/>
    <text x="130" y="17" font-family="Arial, sans-serif" font-size="10" fill="#ec4899" text-anchor="middle">Security</text>

    <rect x="180" y="0" width="80" height="26" rx="13" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="220" y="17" font-family="Arial, sans-serif" font-size="10" fill="#06b6d4" text-anchor="middle">Containers</text>
  </g>

  <!-- Architecture label -->
  <g transform="translate(297, 728)">
    <text x="0" y="0" font-family="Consolas, monospace" font-size="11" fill="#525252" text-anchor="middle">
      From System Calls to Distributed Consensus
    </text>
  </g>

  <!-- Author -->
  <text x="297" y="770" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" letter-spacing="3">
    ACHRAF SOLTANI
  </text>

  <!-- Website -->
  <text x="297" y="792" font-family="Arial, sans-serif" font-size="11" fill="#737373" text-anchor="middle">
    www.achrafsoltani.com
  </text>

  <!-- Bottom accent bar -->
  <rect x="0" y="834" width="595" height="8" fill="url(#amberGradient)"/>
</svg>
